{% extends "layout.html" %}

{% block body %}

<div style="display: flex; justify-content: center;">
    <img style=" margin-top: 65px; margin-bottom: 65px; width: 500px; height: auto; " src=" https://media.tenor.com/x8v1oNUOmg4AAAAM/rickroll-roll.gif">
</div>

<div style="display: grid; align-items: center; grid-template-columns: auto auto auto auto auto;">
    {% for result in results %}
    <div class="movies">
        <img src="{{result[1]}}" alt ="An image of {{result[0]}}">
    </div>
    {% endfor %}
</div>


{% endblock %}
