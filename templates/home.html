{% extends "layout.html" %}

{% block body %}
<div style="margin-top:80px;">

    <div style="display: flex; justify-content: center;">
        <h2 style="font-size: var(--font2);"> What's Popular:</h2>
    </div>

    <div class="home-scrollbar">
        {% for result in results %}
        <div class="scrollbar-img">
            <a href="{{ url_for('individual_movie', id=result['item_id']) }}">
                <img src="{{result['imgURL']}}" alt ="An image of {{result['name']}}">
            </a>
        <div class="scrollbar-hover">{{result['name']}}</div>
        </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
